name: Quality
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/ritm_build
      POSTGRES_URL_NON_POOLING: postgresql://user:pass@localhost:5432/ritm_build
      NEXT_PUBLIC_SITE_URL: https://ritm-app-eight.vercel.app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
